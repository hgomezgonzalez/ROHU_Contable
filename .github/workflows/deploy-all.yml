name: Deploy to All Clients

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm deployment to ALL clients'
        required: true

jobs:
  read-clients:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          APPS=$(python3 -c "
          import json
          with open('clients.json') as f:
              clients = json.load(f)
          apps = [c['app'] for c in clients]
          print(json.dumps(apps))
          ")
          echo "matrix={\"app\":$APPS}" >> $GITHUB_OUTPUT

  deploy:
    needs: read-clients
    if: github.event.inputs.confirm == 'deploy'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.read-clients.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure VOUCHER_HMAC_SECRET exists
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          # Read current config vars via Heroku Platform API
          EXISTING=$(curl -s \
            -H "Authorization: Bearer $HEROKU_API_KEY" \
            -H "Accept: application/vnd.heroku+json; version=3" \
            "https://api.heroku.com/apps/${{ matrix.app }}/config-vars" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('VOUCHER_HMAC_SECRET',''))" 2>/dev/null || echo "")

          if [ -z "$EXISTING" ]; then
            SECRET=$(python3 -c "import secrets; print(secrets.token_hex(32))")
            curl -s -X PATCH \
              -H "Authorization: Bearer $HEROKU_API_KEY" \
              -H "Accept: application/vnd.heroku+json; version=3" \
              -H "Content-Type: application/json" \
              -d "{\"VOUCHER_HMAC_SECRET\": \"$SECRET\"}" \
              "https://api.heroku.com/apps/${{ matrix.app }}/config-vars" > /dev/null
            echo "VOUCHER_HMAC_SECRET configured for ${{ matrix.app }}"
          else
            echo "VOUCHER_HMAC_SECRET already set for ${{ matrix.app }}"
          fi

      - name: Deploy to ${{ matrix.app }}
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          git remote add heroku-${{ matrix.app }} https://heroku:${HEROKU_API_KEY}@git.heroku.com/${{ matrix.app }}.git
          git push heroku-${{ matrix.app }} main --force
          echo "Deployed to ${{ matrix.app }}"

      - name: Wait for release phase
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          echo "Waiting for release phase (migrations + seed-puc)..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s \
              -H "Authorization: Bearer $HEROKU_API_KEY" \
              -H "Accept: application/vnd.heroku+json; version=3" \
              -H "Range: version ..; order=desc,max=1" \
              "https://api.heroku.com/apps/${{ matrix.app }}/releases" \
              | python3 -c "import sys,json; r=json.load(sys.stdin); print(r[0].get('status','') if r else 'pending')" 2>/dev/null || echo "pending")
            echo "  Attempt $i: release status = $STATUS"
            if [ "$STATUS" = "succeeded" ]; then
              echo "Release phase completed"
              break
            elif [ "$STATUS" = "failed" ]; then
              echo "Release phase FAILED"
              # Fetch recent logs via API
              curl -s \
                -H "Authorization: Bearer $HEROKU_API_KEY" \
                -H "Accept: application/vnd.heroku+json; version=3" \
                "https://api.heroku.com/apps/${{ matrix.app }}/releases" \
                | python3 -c "import sys,json; r=json.load(sys.stdin); print(json.dumps(r[0], indent=2) if r else '{}')"
              exit 1
            fi
            sleep 10
          done

      - name: Health check ${{ matrix.app }}
        run: |
          URL="https://${{ matrix.app }}.herokuapp.com/health/full"
          STATUS=$(curl -s -o /tmp/health.json -w "%{http_code}" "$URL" || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ ${{ matrix.app }} is healthy"
            python3 -c "import json; d=json.load(open('/tmp/health.json')); print(json.dumps(d.get('checks',{}), indent=2))"
          else
            echo "❌ ${{ matrix.app }} health check failed (status: $STATUS)"
            cat /tmp/health.json 2>/dev/null || true
            exit 1
          fi

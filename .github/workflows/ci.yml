name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 black isort

      - name: Run flake8
        run: flake8 app/ tests/ --max-line-length=120 --exclude=migrations

      - name: Check black formatting
        run: black --check --line-length=120 app/ tests/

      - name: Check import ordering
        run: isort --check-only --profile=black app/ tests/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: rohu_test
          POSTGRES_PASSWORD: rohu_test
          POSTGRES_DB: ROHU_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://rohu_test:rohu_test@localhost:5432/ROHU_test
      TEST_DATABASE_URL: postgresql://rohu_test:rohu_test@localhost:5432/ROHU_test
      JWT_SECRET_KEY: test-secret-key-ci
      SECRET_KEY: test-secret-key-ci
      VOUCHER_HMAC_SECRET: test-voucher-hmac-secret-ci-0123456789abcdef

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

      - name: Check coverage threshold
        run: python -m pytest tests/ --cov=app --cov-fail-under=30 -q

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Heroku (staging)
        uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_STAGING_APP }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          branch: develop

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Heroku (production)
        uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_PROD_APP }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
